type Endereco {
  id: Int!
  rua: String!
  numero: Int!
  complemento: String
  cidade: String!
  estado: String!
  pais: String!
  cep: String!
  latitude: Float
  longitude: Float
  usuario: Usuario
  proprietario: Proprietario
  createdAt: DateTime!
  updatedAt: DateTime!
}

input CreateEnderecoInput {
  rua: String!
  numero: Int!
  complemento: String
  cidade: String!
  estado: String!
  pais: String!
  cep: String!
  latitude: Float
  longitude: Float
  usuarioId: Int
  proprietarioId: Int
}

input UpdateEnderecoInput {
  rua: String
  numero: Int
  complemento: String
  cidade: String
  estado: String
  pais: String
  cep: String
  latitude: Float
  longitude: Float
  usuarioId: Int
  proprietarioId: Int
}