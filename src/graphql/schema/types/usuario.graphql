type Usuario {
  id: Int!
  nome: String!
  email: String!
  dataNascimento: DateTime!

  endereco: Endereco
  alugueis: [Aluguel!]!
  avaliacoes: [Avaliacao!]!
  createdAt: DateTime!
  updatedAt: DateTime!
}

input CreateUsuarioInput {
  nome: String!
  email: String!
  dataNascimento: DateTime!
  enderecoId: Int
}

input UpdateUsuarioInput {
  nome: String
  email: String
  dataNascimento: DateTime
  enderecoId: Int
}