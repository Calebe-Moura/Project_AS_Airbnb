type Proprietario {
  id: Int!
  nome: String!
  email: String!
  endereco: Endereco
  alugueis: [Aluguel!]!
  createdAt: DateTime!
  updatedAt: DateTime!
}

input CreateProprietarioInput {
  nome: String!
  email: String!
  enderecoId: Int
}

input UpdateProprietarioInput {
  nome: String
  email: String
  enderecoId: Int
}